version: '3.8'

services:
  robot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: robot_arm
    environment:
      - ROS_DOMAIN_ID=42
      - DISPLAY=${DISPLAY:-:0}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    command: >
      bash -c "ros2 launch robot_arm robot.launch.py &
      ros2 run rviz2 rviz2 -d /ros2_ws/src/robot_arm/rviz/robot.rviz;
      wait"
